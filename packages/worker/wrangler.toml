name = "notion-framer-sync"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "publishflow"
# Run: wrangler d1 create publishflow — then paste database_id below
database_id = "d906a6c4-123d-42db-ab0f-ea6aa4977ab2"
migrations_dir = "migrations"


[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "0b528217f1774c2c92ef3379c61e0f62"

[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[vars]
WORKER_PUBLIC_URL = "https://notion-framer-sync.framerskool.workers.dev"
NOTION_REDIRECT_URI = "https://notion-framer-sync.framerskool.workers.dev/oauth/notion/callback"
GOOGLE_REDIRECT_URI = "https://notion-framer-sync.framerskool.workers.dev/auth/google/callback"
WEB_APP_URL = "https://notion-framer-sync.framerskool.workers.dev"
AUTH_DEV_ALLOW_ANY = "false"

# One-time before first deploy with queues:
#   npx wrangler queues create sync-jobs
[[queues.producers]]
queue = "sync-jobs"
binding = "SYNC_QUEUE"

[[queues.consumers]]
queue = "sync-jobs"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 5
retry_delay = 60

# Cron was removed when sync moved to the queue consumer. Keep this empty so deploy
# clears any stale */1 * * * * trigger still registered in Cloudflare.
[triggers]
crons = []

# Secrets (wrangler secret put):
# NOTION_CLIENT_ID, NOTION_CLIENT_SECRET, ENCRYPTION_KEY, SESSION_SIGNING_SECRET
# GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
