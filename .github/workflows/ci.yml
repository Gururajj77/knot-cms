name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: |
          npm run build -w @nocms/shared
          npm run build -w @nocms/web

      - name: Typecheck
        run: |
          npm run check -w @nocms/shared
          npm run typecheck -w @nocms/web
          npm run typecheck -w @nocms/worker

      - name: Test
        run: npm run test
